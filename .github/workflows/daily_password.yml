name: Daily Password to DingTalk

on:
  schedule:
    # 每天北京时间 9:00 （UTC 需要减 8 小时，即凌晨 1:00）
    # 注意：cron 是 UTC 时间
    - cron: '44 20 * * *'
  workflow_dispatch:   # 允许在 GitHub 网页上手动触发，方便测试

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行脚本
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python send_password.py
